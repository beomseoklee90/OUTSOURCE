name: Deploy to GitHub Pages
on:
  push:
    branches: ["main"] # 본인 메인 브랜치 이름 확인
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run build
      - uses: actions/deploy-pages@v4
